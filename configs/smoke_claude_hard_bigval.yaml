# Same difficulty knobs as smoke_claude_hard.yaml (multi-step chaining,
# heavier distractors) but val/test bumped from 4 to 16 examples each.
#
# Running smoke_claude_hard.yaml 6 times showed val flipping between 0.75
# and 1.0 run to run, with only 1/6 runs ever giving the gate something to
# accept - but at 4 examples, a single wrong answer swings the score by
# 0.25, so it's hard to tell a real ceiling from measurement noise. At 16
# examples one wrong answer is only a 0.0625 swing, which should give a much
# more stable read on whether Haiku genuinely struggles with this difficulty
# level or not.

skill_path: skills/initial.md
output_dir: out/smoke_claude_hard_bigval

executor:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 256

optimizer:
  provider: anthropic
  model: claude-sonnet-5
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 1024

reflector:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 256

train:
  epochs: 2
  batch_size: 4
  val_batch_size: 16
  max_ops_per_edit: 3
  rejection_buffer_size: 5
  min_improvement: 0.000001
  seed: 0

env:
  name: synthetic_arithmetic
  params:
    train_size: 8
    val_size: 16
    test_size: 16
    seed: 2
    distractor_rate: 0.8
    max_distractors: 2
    multi_step_rate: 0.75
