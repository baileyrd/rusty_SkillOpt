# Harder real-Claude smoke run. The first smoke run (smoke_claude.yaml) hit
# a 1.0 val score immediately, so the validation gate had nothing to accept.
# This variant cranks up synthetic_arithmetic's multi-step chaining and
# distractor density so Haiku (as executor) actually makes some mistakes,
# giving the optimizer real failures to fix and the gate real room to
# accept an improving edit.

skill_path: skills/initial.md
output_dir: out/smoke_claude_hard

executor:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 256

optimizer:
  provider: anthropic
  model: claude-sonnet-5
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 1024

reflector:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 256

train:
  epochs: 2
  batch_size: 4
  val_batch_size: 4
  max_ops_per_edit: 3
  rejection_buffer_size: 5
  min_improvement: 0.000001
  seed: 0

env:
  name: synthetic_arithmetic
  params:
    train_size: 8
    val_size: 4
    test_size: 4
    seed: 2
    distractor_rate: 0.8
    max_distractors: 2
    multi_step_rate: 0.75
