# Example config using Qwen models via Alibaba Cloud DashScope's
# OpenAI-compatible mode, instead of a dedicated backend.
#
# DashScope's compatible-mode endpoint (base_url below) speaks standard
# Bearer auth + OpenAI-shaped chat-completions JSON - exactly what the
# `openai_compatible` provider already implements, the same way
# configs/ollama_example.yaml covers Ollama. No new code needed.
#
# NOTE: this config has been verified at the code level (DashScope's
# documented compatible-mode contract matches openai_compatible's request
# shape exactly) but not with a live call - no DashScope API key was
# available to test with, and dashscope.aliyuncs.com is blocked by this
# session's egress policy. If DashScope's actual behavior turns out to
# diverge from its docs, this is a one-line base_url/model fix, not a
# code change.
#
# Prerequisites:
#   1. A DashScope API key (https://dashscope.console.aliyun.com/) in
#      DASHSCOPE_API_KEY.
#   2. cargo run -p skillopt-cli -- train --config configs/qwen_example.yaml

skill_path: skills/initial.md
output_dir: out/qwen_example

executor:
  provider: openai_compatible
  model: qwen-plus
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key_env: DASHSCOPE_API_KEY
  max_tokens: 256

optimizer:
  provider: openai_compatible
  model: qwen-max
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key_env: DASHSCOPE_API_KEY
  max_tokens: 1024

reflector:
  provider: openai_compatible
  model: qwen-plus
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key_env: DASHSCOPE_API_KEY
  max_tokens: 256

train:
  epochs: 1
  batch_size: 4
  val_batch_size: 4
  max_ops_per_edit: 3
  rejection_buffer_size: 5
  min_improvement: 0.000001
  seed: 0

env:
  name: synthetic_arithmetic
  params:
    train_size: 8
    val_size: 4
    test_size: 4
    seed: 0
    distractor_rate: 0.5
