# Same difficulty knobs as full_claude.yaml (single-op arithmetic, 50%
# chance of one distractor, no multi-step chaining) but with a much larger
# training set - 64 examples instead of 24 - to check whether the val/test
# ceiling in full_claude.yaml (0/12 accepted, 1.0 -> 1.0) was a property of
# the difficulty level or just an artifact of a small, easily-saturated
# training set. epochs is 1 instead of 2 so the optimizer sees 64 unique
# examples once rather than fewer examples repeated, keeping the call count
# from doubling on top of the size increase.

skill_path: skills/initial.md
output_dir: out/full_claude_bigtrain

executor:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 256

optimizer:
  provider: anthropic
  model: claude-sonnet-5
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 1024

reflector:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 256

train:
  epochs: 1
  batch_size: 4
  val_batch_size: 8
  max_ops_per_edit: 3
  rejection_buffer_size: 5
  min_improvement: 0.000001
  seed: 0

env:
  name: synthetic_arithmetic
  params:
    train_size: 64
    val_size: 8
    test_size: 16
    seed: 0
    distractor_rate: 0.5
