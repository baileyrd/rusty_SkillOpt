# Same train/env sizing as example.yaml (24/8/16 examples, 2 epochs,
# batch_size 4, val_batch_size 8 -> up to 12 optimization steps) but wired
# to the live Anthropic API instead of the mock backends, so it actually
# runs the training loop for real. Uses the same env difficulty as
# example.yaml (single-op arithmetic + a 50% chance of one distractor
# sentence, no multi-step chaining) - see smoke_claude_hard.yaml for the
# harder multi-step/distractor-heavy variant.

skill_path: skills/initial.md
output_dir: out/full_claude

executor:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 256

optimizer:
  provider: anthropic
  model: claude-sonnet-5
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 1024

reflector:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 256

train:
  epochs: 2
  batch_size: 4
  val_batch_size: 8
  max_ops_per_edit: 3
  rejection_buffer_size: 5
  min_improvement: 0.000001
  seed: 0

env:
  name: synthetic_arithmetic
  params:
    train_size: 24
    val_size: 8
    test_size: 16
    seed: 0
    distractor_rate: 0.5
