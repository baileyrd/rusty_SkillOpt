# Small real-Claude smoke run: confirms the loop does a genuine rollout ->
# reflect -> optimize -> validation-gate cycle against the live Anthropic
# API. Deliberately tiny (few examples, 1 epoch) to keep call count low.

skill_path: skills/initial.md
output_dir: out/smoke_claude

executor:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 256

optimizer:
  provider: anthropic
  model: claude-sonnet-5
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 1024

reflector:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 256

train:
  epochs: 1
  batch_size: 4
  val_batch_size: 4
  max_ops_per_edit: 3
  rejection_buffer_size: 5
  min_improvement: 0.000001
  seed: 0

env:
  name: synthetic_arithmetic
  params:
    train_size: 8
    val_size: 4
    test_size: 4
    seed: 1
    distractor_rate: 0.5
