# Example SkillOpt-rs run configuration.
#
# `mock` backends need no API key and never touch the network - useful to
# smoke-test the CLI/config wiring (`cargo run -p skillopt-cli -- train
# --config configs/example.yaml`). They don't actually improve the skill
# since the mock executor just echoes its input back; swap in `anthropic` or
# `openai_compatible` below (and set the relevant API key env var) to run
# the real training loop.

skill_path: skills/initial.md
output_dir: out/example

executor:
  provider: mock          # or: anthropic / openai_compatible
  model: mock-executor
  # provider: anthropic
  # model: claude-sonnet-5
  # api_key_env: ANTHROPIC_API_KEY

optimizer:
  provider: mock
  model: mock-optimizer
  # provider: anthropic
  # model: claude-opus-4-8
  # api_key_env: ANTHROPIC_API_KEY

reflector:
  provider: mock
  model: mock-reflector
  # provider: openai_compatible
  # model: gpt-4o-mini
  # api_key_env: OPENAI_API_KEY

train:
  epochs: 2
  batch_size: 4
  val_batch_size: 8
  max_ops_per_edit: 3
  rejection_buffer_size: 5
  min_improvement: 0.000001
  seed: 0

env:
  name: synthetic_arithmetic
  params:
    train_size: 24
    val_size: 8
    test_size: 16
    seed: 0
    distractor_rate: 0.5
