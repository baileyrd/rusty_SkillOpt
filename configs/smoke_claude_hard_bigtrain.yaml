# Same difficulty knobs and val/test size as smoke_claude_hard_bigval.yaml
# (multi-step chaining, heavier distractors, 16 val/16 test) but train_size
# bumped from 8 to 32. epochs dropped from 2 to 1 so the optimizer sees 32
# unique examples once (8 steps) rather than compounding the size increase
# with a second epoch's worth of extra calls.
#
# smoke_claude_hard_bigval.yaml (8 train examples) hit a perfect val 1.0 but
# test came in at 0.875 - two legitimate 4-op chained-arithmetic failures
# that never showed up in any of the 4 training batches, so the optimizer
# never got a training-time failure to react to. This checks whether a
# bigger, more representative training pool actually surfaces that failure
# mode during training and produces an accepted fix for it.

skill_path: skills/initial.md
output_dir: out/smoke_claude_hard_bigtrain

executor:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 256

optimizer:
  provider: anthropic
  model: claude-sonnet-5
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 1024

reflector:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 256

train:
  epochs: 1
  batch_size: 4
  val_batch_size: 16
  max_ops_per_edit: 3
  rejection_buffer_size: 5
  min_improvement: 0.000001
  seed: 0

env:
  name: synthetic_arithmetic
  params:
    train_size: 32
    val_size: 16
    test_size: 16
    seed: 2
    distractor_rate: 0.8
    max_distractors: 2
    multi_step_rate: 0.75
