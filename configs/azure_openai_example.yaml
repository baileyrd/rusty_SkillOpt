# Example config using Azure OpenAI instead of plain OpenAI/Anthropic.
#
# Azure OpenAI differs from plain OpenAI-compatible endpoints in two ways
# `openai_compatible` doesn't accommodate: auth is an `api-key` header (not
# `Authorization: Bearer`), and the URL encodes both the resource endpoint
# and a deployment name rather than taking `model` in the request body. Use
# the `azure_openai` provider for these.
#
# - `base_url` is the resource endpoint, e.g.
#     https://my-resource.openai.azure.com
# - `model` is your Azure *deployment name* (not necessarily the same
#     string as the underlying model, though they're commonly set to match).
# - `api_version` is optional; defaults to a recent stable GA version
#     (see azure_openai::DEFAULT_API_VERSION) if unset.

skill_path: skills/initial.md
output_dir: out/azure_openai_example

executor:
  provider: azure_openai
  base_url: https://my-resource.openai.azure.com
  model: gpt-4o-mini-deployment
  api_key_env: AZURE_OPENAI_API_KEY
  max_tokens: 256

optimizer:
  provider: azure_openai
  base_url: https://my-resource.openai.azure.com
  model: gpt-4o-deployment
  api_key_env: AZURE_OPENAI_API_KEY
  max_tokens: 1024

reflector:
  provider: azure_openai
  base_url: https://my-resource.openai.azure.com
  model: gpt-4o-mini-deployment
  api_key_env: AZURE_OPENAI_API_KEY
  max_tokens: 256

train:
  epochs: 1
  batch_size: 4
  val_batch_size: 4
  max_ops_per_edit: 3
  rejection_buffer_size: 5
  min_improvement: 0.000001
  seed: 0

env:
  name: synthetic_arithmetic
  params:
    train_size: 8
    val_size: 4
    test_size: 4
    seed: 0
    distractor_rate: 0.5
