# Example config using a local Ollama server instead of a hosted API.
# Ollama exposes an OpenAI-compatible /v1/chat/completions endpoint and
# doesn't check auth by default, so this uses the `openai_compatible`
# provider with no api_key_env set at all (no dummy key needed).
#
# Prerequisites:
#   1. Install and run Ollama (https://ollama.com), listening on its default
#      port 11434.
#   2. Pull whatever models you want to use, e.g.:
#        ollama pull llama3.1
#        ollama pull qwen2.5:14b
#   3. cargo run -p skillopt-cli -- train --config configs/ollama_example.yaml

skill_path: skills/initial.md
output_dir: out/ollama_example

executor:
  provider: openai_compatible
  model: llama3.1
  base_url: http://localhost:11434/v1
  max_tokens: 256

optimizer:
  provider: openai_compatible
  model: qwen2.5:14b
  base_url: http://localhost:11434/v1
  max_tokens: 1024

reflector:
  provider: openai_compatible
  model: llama3.1
  base_url: http://localhost:11434/v1
  max_tokens: 256

train:
  epochs: 1
  batch_size: 4
  val_batch_size: 4
  max_ops_per_edit: 3
  rejection_buffer_size: 5
  min_improvement: 0.000001
  seed: 0

env:
  name: synthetic_arithmetic
  params:
    train_size: 8
    val_size: 4
    test_size: 4
    seed: 0
    distractor_rate: 0.5
